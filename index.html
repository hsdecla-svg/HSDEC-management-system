<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSDEC Global Hub - Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/google-calendar@6.1.10/index.global.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #0f172a; font-family: 'Inter', sans-serif; color: white; overflow-x: hidden; }
        
        .menu-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .menu-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-8px);
            border-color: #10b981;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* --- 年表タイムラインのスタイル --- */
        #timeline-section { display: none; width: 100%; }
        .timeline-scroll {
            display: flex;
            overflow-x: auto;
            padding: 40px 20px;
            gap: 30px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .timeline-card {
            min-width: 300px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            flex-shrink: 0;
        }
        .timeline-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 1.5rem;
            margin-bottom: 15px;
            background: #1e293b;
        }

        /* --- カレンダー設定 --- */
        .fc { border: none !important; font-size: 11px; }
        .fc-theme-standard td, .fc-theme-standard th { border: 1px solid rgba(255, 255, 255, 0.1) !important; }
        .fc-col-header-cell-cushion { color: #94a3b8; font-weight: 900; text-transform: uppercase; }
        .fc-day-sat .fc-col-header-cell-cushion, .fc-day-sat .fc-daygrid-day-number { color: #60a5fa !important; } 
        .fc-day-sun .fc-col-header-cell-cushion, .fc-day-sun .fc-daygrid-day-number { color: #f87171 !important; } 
        .fc-daygrid-day-frame { min-height: 45px !important; cursor: pointer; }
        .fc-daygrid-event-harness { display: none !important; }
        .has-event::after {
            content: ''; position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
            width: 6px; height: 6px; background: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981;
        }
        .fc-toolbar-title { font-size: 16px !important; font-weight: 900 !important; color: #10b981; }
        .fc-button { background: transparent !important; border: none !important; color: #64748b !important; font-weight: 900 !important; }

        #eventModal, #calendarEditSection { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); align-items: center; justify-content: center; }
        .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; width: 100%; color: white; margin-top: 5px; }
        .label-style { font-size: 10px; font-weight: 900; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.1em; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6 text-white">

    <div id="auth-section" class="w-full max-w-md space-y-6">
        <div class="text-center">
            <h1 class="text-5xl font-black italic text-emerald-500 tracking-tighter">HSDEC</h1>
            <p class="text-slate-500 font-black uppercase tracking-[0.3em] text-[10px] mt-2">Central Management System</p>
        </div>
        <div class="bg-white/5 rounded-[2.5rem] p-4 border border-white/10 shadow-2xl">
            <div id="calendar"></div>
        </div>
        <div class="bg-white/5 p-8 rounded-[2.5rem] border border-white/10 shadow-2xl">
            <label class="block text-[10px] font-black text-slate-500 uppercase mb-2 tracking-widest">Select User</label>
            <select id="user-select" class="w-full bg-slate-800 border-none p-4 rounded-xl mb-4 text-white font-bold outline-none">
                <option value="Takashi">Takashi (Admin)</option>
                <option value="Chansouk">Chansouk (Staff)</option>
                <option value="Mim">Mim (Staff)</option>
                <option value="Chanthaviphone">Chanthaviphone (VV)</option>
                <option value="Sengmala">Sengmala (SV)</option>
                <option value="Guest">Guest</option>
            </select>
            <input type="password" id="pass" placeholder="••••••••" class="w-full bg-slate-800 border-none p-5 rounded-2xl mb-6 text-white text-center text-2xl focus:ring-2 focus:ring-emerald-500 outline-none">
            <button onclick="login()" class="w-full bg-emerald-500 text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-emerald-500/20 active:scale-95 transition-all uppercase tracking-widest">Enter System</button>
            <p id="error" class="text-rose-500 text-xs mt-6 text-center hidden font-black uppercase tracking-widest italic">Access Denied.</p>
        </div>
    </div>

    <div id="menu-section" class="w-full max-w-5xl hidden flex flex-col space-y-12 py-10">
        <div class="flex justify-between items-end px-4">
            <div>
                <h2 class="text-5xl font-black italic tracking-tighter text-white">CONTROL HUB</h2>
                <p id="welcome-msg" class="text-emerald-500 font-black uppercase text-[10px] tracking-widest mt-2">Logged in</p>
            </div>
            <button onclick="location.reload()" class="text-[10px] font-black text-slate-500 hover:text-white uppercase border border-slate-700 px-6 py-3 rounded-full transition">Logout</button>
        </div>
        <div id="menu-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 px-4"></div>
    </div>

    <div id="timeline-section" class="w-full max-w-6xl hidden flex flex-col space-y-8 py-10 px-4">
        <div class="flex justify-between items-center">
            <h2 class="text-4xl font-black italic tracking-tighter text-emerald-500 uppercase">History Timeline</h2>
            <button onclick="backToMenu()" class="text-[10px] font-black text-slate-500 hover:text-white uppercase border border-slate-700 px-6 py-3 rounded-full transition">Back to Menu</button>
        </div>
        <div id="timeline-content" class="timeline-scroll scrollbar-hide"></div>
    </div>

    <div id="calendarEditSection">
        <div class="bg-slate-900 border border-emerald-500/30 rounded-[2.5rem] p-8 w-[95%] max-w-md overflow-y-auto max-h-[90vh]" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black italic uppercase text-emerald-500">Edit Calendar</h3>
                <button onclick="closeCalendarEdit()" class="text-slate-500 font-black text-xs uppercase">Close ✕</button>
            </div>
            <div id="edit-calendar-container" class="mb-8 bg-white/5 p-4 rounded-2xl border border-white/5">
                <div id="calendar-for-edit"></div>
            </div>
            <div class="space-y-4 bg-white/5 p-6 rounded-[2rem] border border-white/10 text-left">
                <h4 id="edit-mode-title" class="text-xs font-black uppercase text-slate-400">Add New Event</h4>
                <input type="hidden" id="event-id">
                <input type="text" id="event-title" class="input-field" placeholder="Title">
                <input type="date" id="event-date" class="input-field">
                <textarea id="event-description" class="input-field h-20" placeholder="Description & Photo Link..."></textarea>
                <div class="flex gap-2 pt-4">
                    <button id="save-event-btn" onclick="saveEvent()" class="flex-1 bg-emerald-500 text-white py-4 rounded-xl font-black text-xs uppercase">Save</button>
                    <button id="delete-event-btn" onclick="deleteEvent()" class="flex-1 bg-rose-500 text-white py-4 rounded-xl font-black text-xs uppercase hidden">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <div id="eventModal" onclick="this.style.display='none'">
        <div class="bg-slate-900 border border-emerald-500/30 rounded-[2.5rem] p-8 w-[85%] max-w-xs text-center" onclick="event.stopPropagation()">
            <h3 id="modalTitle" class="text-xl font-black text-white mb-2 italic uppercase"></h3>
            <p id="modalDate" class="text-[10px] font-bold text-emerald-500 mb-6 tracking-widest"></p>
            <div id="modalDesc" class="text-xs text-slate-400 mb-8 text-left border-t border-white/10 pt-4 max-h-[200px] overflow-y-auto"></div>
            <button class="w-full bg-emerald-500 text-white py-4 rounded-2xl font-black text-[12px] uppercase">Close</button>
        </div>
    </div>

    <script>
        const GAS_CAL_URL = 'https://script.google.com/macros/s/AKfycbzdAZAcryW4C9u3VE-DoBWBpBeB-lUIlxHPU3qBgq3oS2DKOr-fWuN239iNyhGTq7o0Nw/exec';
        const CALENDAR_ID = 'hsdec.la@gmail.com';
        const API_KEY = 'AIzaSyCzE9RsYu1ec6_b0ePHj_7FEOh9aF0fQi0';

        const USER_DB = {
            "Takashi": { pw: "Tks83446412", role: "admin" },
            "Chansouk": { pw: "97372185", role: "staff" },
            "Mim": { pw: "78277996", role: "staff" },
            "Chanthaviphone": { pw: "96086112", role: "vv" },
            "Sengmala": { pw: "22886998", role: "sv" },
            "Guest": { pw: "HSDEC2025", role: "guest" }
        };

        let mainCalendar, editCalendar;

        window.onload = function() { initCalendar(); };

        function initCalendar() {
            const calendarEl = document.getElementById('calendar');
            mainCalendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                googleCalendarApiKey: API_KEY,
                events: { googleCalendarId: CALENDAR_ID },
                headerToolbar: { left: 'prev', center: 'title', right: 'next' },
                height: 'auto',
                eventDidMount: (info) => {
                    const dayEl = info.el.closest('.fc-daygrid-day');
                    if (dayEl) {
                        dayEl.classList.add('has-event');
                        dayEl.onclick = () => showModal(info.event);
                    }
                }
            });
            mainCalendar.render();
        }

        function showModal(event) {
            document.getElementById('modalTitle').innerText = event.title;
            document.getElementById('modalDate').innerText = event.start.toLocaleDateString();
            document.getElementById('modalDesc').innerText = event.extendedProps.description || 'No details.';
            document.getElementById('eventModal').style.display = 'flex';
        }

        function login() {
            const name = document.getElementById('user-select').value;
            const pass = document.getElementById('pass').value;
            if (USER_DB[name] && USER_DB[name].pw === pass) {
                showMenu(name, USER_DB[name].role);
            } else {
                document.getElementById('error').classList.remove('hidden');
                setTimeout(() => { document.getElementById('error').classList.add('hidden'); }, 2000);
            }
        }

        function showMenu(name, role) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('menu-section').classList.remove('hidden');
            document.getElementById('timeline-section').classList.add('hidden');
            document.getElementById('welcome-msg').innerText = `Logged in as ${name} (${role.toUpperCase()})`;
            
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = ''; 
            
            const allMenus = [
                { title: 'Timeline', desc: '歴史年表形式で予定を確認', icon: '⏳', action: 'openTimeline', roles: ['admin', 'staff', 'sv', 'vv', 'guest'] },
                { title: 'Workers', desc: '労働者・名簿管理', icon: '👤', url: 'worker.html', roles: ['admin', 'staff', 'sv', 'vv', 'guest'] },
                { title: 'Calendar Edit', desc: 'カレンダーの追加・削除', icon: '📅', action: 'openCalendarEdit', roles: ['admin', 'staff'] },
                { title: 'Finance', desc: '支出・収支・自動計算', icon: '💰', url: 'finance.html', roles: ['admin', 'staff'] },
                { title: 'Diary', desc: '日報作成・現場写真', icon: '📝', url: 'diary.html', roles: ['admin', 'staff', 'sv'] },
                { title: 'Contracts', desc: '契約書類管理', icon: '📄', url: 'contracts.html', roles: ['admin', 'staff'] },
                { title: 'Cloud Photo', desc: 'Google Drive 共有', icon: '📸', url: 'https://drive.google.com/', roles: ['admin', 'staff', 'sv', 'vv'] }
            ];

            allMenus.forEach(m => {
                if (m.roles.includes(role)) {
                    const card = document.createElement('div');
                    card.className = "menu-card p-10 rounded-[2.5rem] cursor-pointer group";
                    card.onclick = m.action ? () => window[m.action]() : () => location.href = m.url;
                    card.innerHTML = `<div class="text-4xl mb-4">${m.icon}</div><h3 class="text-2xl font-black tracking-tight uppercase italic">${m.title}</h3><p class="text-slate-500 text-sm mt-3 font-bold">${m.desc}</p>`;
                    grid.appendChild(card);
                }
            });
        }

        async function openTimeline() {
            document.getElementById('menu-section').classList.add('hidden');
            document.getElementById('timeline-section').classList.remove('hidden');
            const content = document.getElementById('timeline-content');
            content.innerHTML = '<p class="text-emerald-500 font-black animate-pulse">LOADING HISTORY...</p>';

            try {
                const response = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${CALENDAR_ID}/events?key=${API_KEY}&singleEvents=true&orderBy=startTime&timeMin=${new Date().toISOString()}`);
                const data = await response.json();
                content.innerHTML = '';

                data.items.forEach(item => {
                    const desc = item.description || '';
                    const photoMatch = desc.match(/https?:\/\/[^\s]+/);
                    const date = new Date(item.start.dateTime || item.start.date).toLocaleDateString('ja-JP', { month: 'short', day: 'numeric', weekday: 'short' });

                    const card = document.createElement('div');
                    card.className = 'timeline-card';
                    card.innerHTML = `
                        ${photoMatch ? `<img src="${photoMatch[0]}" class="timeline-img">` : `<div class="timeline-img flex items-center justify-center text-xs text-slate-600">No Image</div>`}
                        <span class="text-emerald-500 font-black text-[10px] tracking-widest uppercase">${date}</span>
                        <h4 class="text-xl font-black italic mt-1">${item.summary}</h4>
                        <p class="text-xs text-slate-500 mt-3 leading-relaxed line-clamp-3">${desc.replace(photoMatch ? photoMatch[0] : '', '')}</p>
                    `;
                    content.appendChild(card);
                });
            } catch (e) {
                content.innerHTML = '<p class="text-rose-500">Failed to load calendar data.</p>';
            }
        }

        function backToMenu() {
            document.getElementById('timeline-section').classList.add('hidden');
            document.getElementById('menu-section').classList.remove('hidden');
        }

        function openCalendarEdit() {
            document.getElementById('calendarEditSection').style.display = 'flex';
            editCalendar = new FullCalendar.Calendar(document.getElementById('calendar-for-edit'), {
                initialView: 'dayGridMonth',
                googleCalendarApiKey: API_KEY,
                events: { googleCalendarId: CALENDAR_ID },
                height: 300,
                dateClick: (info) => setEditForm(null, info.dateStr),
                eventClick: (info) => setEditForm(info.event)
            });
            editCalendar.render();
        }

        function closeCalendarEdit() { document.getElementById('calendarEditSection').style.display = 'none'; mainCalendar.refetchEvents(); }

        function setEditForm(event, dateStr) {
            const deleteBtn = document.getElementById('delete-event-btn');
            if (event) {
                document.getElementById('event-id').value = event.id;
                document.getElementById('event-title').value = event.title;
                document.getElementById('event-date').value = event.startStr.split('T')[0];
                document.getElementById('event-description').value = event.extendedProps.description || '';
                deleteBtn.classList.remove('hidden');
            } else {
                document.getElementById('event-id').value = '';
                document.getElementById('event-title').value = '';
                document.getElementById('event-date').value = dateStr;
                document.getElementById('event-description').value = '';
                deleteBtn.classList.add('hidden');
            }
        }

        async function sendToGas(payload) {
            try {
                await fetch(GAS_CAL_URL, { method: 'POST', body: JSON.stringify(payload) });
                alert("Updated!");
                editCalendar.refetchEvents();
            } catch (e) { alert("Error!"); }
        }

        async function saveEvent() {
            const p = { action: document.getElementById('event-id').value ? "updateEvent" : "addEvent", id: document.getElementById('event-id').value, title: document.getElementById('event-title').value, date: document.getElementById('event-date').value, description: document.getElementById('event-description').value };
            await sendToGas(p);
        }

        async function deleteEvent() { if(confirm("Delete?")) await sendToGas({ action: "deleteEvent", id: document.getElementById('event-id').value }); }
    </script>
</body>
</html>
