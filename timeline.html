<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSDEC | History Timeline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #0f172a; font-family: 'Inter', sans-serif; color: white; overflow: hidden; }
        
        /* タイムライン全体のコンテナ */
        .timeline-container {
            display: flex;
            overflow-x: auto;
            padding: 100px 50px 150px;
            gap: 40px;
            position: relative;
            scrollbar-width: none; /* 標準のスクロールバーを隠す */
            cursor: grab;
            user-select: none;
        }
        .timeline-container:active { cursor: grabbing; }
        .timeline-container::-webkit-scrollbar { display: none; } /* Chrome用 */

        /* 中央を貫く青いライン */
        .timeline-line {
            position: absolute;
            top: 360px; /* ドットの位置に合わせる */
            left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, #3498db, #10b981, transparent);
            z-index: 0;
            opacity: 0.5;
        }

        /* イベントカード */
        .event-card {
            min-width: 320px;
            max-width: 320px;
            background: white;
            border-radius: 24px;
            position: relative;
            z-index: 1;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #1e293b;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .event-card:hover { transform: translateY(-20px) scale(1.02); }

        /* 画像エリア */
        .event-image {
            width: 100%;
            aspect-ratio: 16 / 10;
            object-fit: cover;
            border-radius: 24px 24px 0 0;
            background: #f1f5f9;
        }

        /* ライン上のドット */
        .dot {
            width: 20px; height: 20px; background: #3498db;
            border-radius: 50%; position: absolute;
            bottom: -65px; left: 50%; transform: translateX(-50%);
            border: 4px solid #0f172a;
            box-shadow: 0 0 20px #3498db;
            transition: all 0.3s ease;
        }
        .event-card:hover .dot { background: #10b981; box-shadow: 0 0 25px #10b981; scale: 1.2; }

        /* テキストエリア */
        .event-content { padding: 24px; }
        .event-date { color: #3498db; font-weight: 900; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.1em; }
        .event-title { font-size: 1.2rem; font-weight: 900; line-height: 1.2; color: #0f172a; font-style: italic; }
    </style>
</head>
<body class="min-h-screen">

    <div class="flex justify-between items-center px-10 pt-10 relative z-10">
        <div>
            <h1 class="text-4xl font-black italic text-emerald-500 tracking-tighter uppercase">History Timeline</h1>
            <p class="text-slate-500 text-[10px] font-bold tracking-[0.4em] uppercase mt-1">HSDEC Archive Stream</p>
        </div>
        <button onclick="location.href='index.html'" class="px-8 py-3 bg-white/5 border border-white/10 rounded-full text-[10px] font-black uppercase hover:bg-white/10 transition backdrop-blur-md">
            Back to Hub
        </button>
    </div>

    <div class="relative">
        <div class="timeline-line"></div>
        <div id="timeline-content" class="timeline-container">
            </div>
    </div>

    <script>
        const CALENDAR_ID = 'hsdec.la@gmail.com';
        const API_KEY = 'AIzaSyCzE9RsYu1ec6_b0ePHj_7FEOh9aF0fQi0';

        async function initTimeline() {
            const container = document.getElementById('timeline-content');
            container.innerHTML = '<div class="w-full text-center text-emerald-500 font-black animate-pulse uppercase tracking-[0.5em] mt-32 text-xl">--- Accessing Database ---</div>';

            try {
                const url = `https://www.googleapis.com/calendar/v3/calendars/${CALENDAR_ID}/events?key=${API_KEY}&singleEvents=true&orderBy=startTime&timeMin=2025-01-01T00:00:00Z`;
                const res = await fetch(url);
                const data = await res.json();
                
                container.innerHTML = ''; 

                if (!data.items || data.items.length === 0) {
                    container.innerHTML = '<div class="w-full text-center text-slate-500 font-black mt-32 italic uppercase tracking-widest">No Records Found</div>';
                    return;
                }

                data.items.forEach(event => {
                    const desc = event.description || '';
                    const start = event.start.dateTime || event.start.date;
                    const dateStr = new Date(start).toLocaleDateString('ja-JP', { month: 'short', day: 'numeric', weekday: 'short' });

                    // --- 画像取得ロジック（さらに強化） ---
                    let imageUrl = 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=800'; 

                   // 1. Google Drive IDを抽出 (より広いパターンに対応)
                   const driveIdMatch = desc.match(/(?:id=|d\/|open\?id=)([a-zA-Z0-9_-]{25,})/);
                   if (driveIdMatch) {
                       // プレビュー用のURLに強制変換
                       imageUrl = `https://drive.google.com/thumbnail?id=${driveIdMatch[1]}&sz=w1000`;
                   } else {
                       // 2. 普通の画像URLを探す
                       const urlMatch = desc.match(/https?:\/\/[^\s]+(?:\.jpg|\.jpeg|\.png|\.webp|\.gif)/i);
                       if (urlMatch) imageUrl = urlMatch[0];
                   }

                    const card = document.createElement('div');
                    card.className = 'event-card group cursor-pointer';
                    
                    // クリックで詳細URL（あれば）かカレンダー詳細を開く
                    card.onclick = () => {
                        const linkMatch = desc.match(/https?:\/\/[^\s]+/);
                        window.open(linkMatch ? linkMatch[0] : event.htmlLink, '_blank');
                    };

                    card.innerHTML = `
                        <div class="relative overflow-hidden rounded-t-[24px]">
                            <img src="${imageUrl}" class="event-image group-hover:scale-110 transition-transform duration-700" 
                                 onerror="this.src='https://images.unsplash.com/photo-1506784365847-bbad939e9335?w=600'">
                            <div class="absolute inset-0 bg-black/10 group-hover:bg-transparent transition-colors duration-500"></div>
                        </div>
                        <div class="dot"></div>
                        <div class="event-content">
                            <div class="event-date">${dateStr}</div>
                            <div class="event-title uppercase truncate">${event.summary || 'DATA RECORD'}</div>
                            <p class="text-[10px] text-slate-400 mt-4 font-bold uppercase leading-relaxed line-clamp-2 italic">
                                ${desc.replace(/https?:\/\/[^\s]+/g, '').trim().substring(0, 80) || 'Archive System Information'}
                            </p>
                        </div>
                    `;
                    container.appendChild(card);
                });

                // --- マウスドラッグで横スクロールを可能にする ---
                enableDragScroll(container);

            } catch (err) {
                container.innerHTML = '<div class="text-rose-500 font-black mt-32 uppercase tracking-widest text-center w-full">Connection Failure</div>';
            }
        }

        function enableDragScroll(slider) {
            let isDown = false;
            let startX;
            let scrollLeft;

            slider.addEventListener('mousedown', (e) => {
                isDown = true;
                slider.classList.add('active');
                startX = e.pageX - slider.offsetLeft;
                scrollLeft = slider.scrollLeft;
            });
            slider.addEventListener('mouseleave', () => isDown = false);
            slider.addEventListener('mouseup', () => isDown = false);
            slider.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - slider.offsetLeft;
                const walk = (x - startX) * 2; // スクロール速度
                slider.scrollLeft = scrollLeft - walk;
            });
        }

        window.onload = initTimeline;
    </script>
</body>
</html>
