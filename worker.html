<!DOCTYPE html>
<html lang="lo">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSDEC Worker Management</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; -webkit-font-smoothing: antialiased; }
        .batch-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; transition: all 0.3s; margin-bottom: 16px; }
        .input-edit { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; font-weight: 600; font-size: 16px; margin-top: 4px; }
        .label-style { font-size: 10px; font-weight: 900; color: #10b981; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-top: 8px; }
        .search-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 12px 20px; width: 100%; color: white; font-weight: bold; outline: none; }
        .worker-item { position: relative; background: rgba(255,255,255,0.05); border-left: 6px solid transparent; border-radius: 16px; padding: 16px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; }
        .scan-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzdAZAcryW4C9u3VE-DoBWBpBeB-lUIlxHPU3qBgq3oS2DKOr-fWuN239iNyhGTq7o0Nw/exec';

        const ALL_FIELDS = [
            'ລໍາດັບ', 'ສະຖານະ', 'Re-entry', 'ຊື່ ແລະ ນາມສະກຸນ', 'Full Name', 
            'Sex', 'Date of birth', 'Age', 'Passport No.', 'Date of issue', 
            'Date of Expiry', 'Village', 'District', 'Province', 'Size', 
            'AC - Name', 'AC - No', 'Google drive'
        ];

        // 日付を「YYYY-MM-DD」形式にクリーンアップする関数
        const formatDate = (val) => {
            if (!val) return '-';
            const s = String(val);
            return s.includes('T') ? s.split('T')[0] : s;
        };

        // Districtごとに色を決定する関数
        const getDistrictColor = (district) => {
            if (!district) return 'border-slate-500';
            const d = String(district).trim();
            // ハッシュ値を作って色を割り当て
            const colors = [
                'border-blue-500',   // 青
                'border-emerald-500', // 緑
                'border-rose-500',    // 赤系
                'border-amber-500',   // オレンジ
                'border-purple-500',  // 紫
                'border-cyan-500',    // 水色
                'border-pink-500'     // ピンク
            ];
            let hash = 0;
            for (let i = 0; i < d.length; i++) {
                hash = d.charCodeAt(i) + ((hash << 5) - hash);
            }
            return colors[Math.abs(hash) % colors.length];
        };

        function App() {
            const [view, setView] = useState('folders');
            const [workers, setWorkers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedBatch, setSelectedBatch] = useState(null);
            const [selectedWorker, setSelectedWorker] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');

            useEffect(() => { fetchData(); }, []);

            const fetchData = async () => {
                setLoading(true);
                try {
                    const res = await fetch(GAS_URL);
                    const data = await res.json();
                    setWorkers(data);
                } catch (e) { console.error("Fetch Error:", e); }
                setLoading(false);
            };

            const handlePassportScan = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsScanning(true);
                try {
                    const workerOCR = await Tesseract.createWorker('eng');
                    const { data: { text } } = await workerOCR.recognize(file);
                    await workerOCR.terminate();

                    const cleanText = text.toUpperCase().replace(/ /g, '');
                    const lines = cleanText.split('\n').filter(l => l.length >= 30);
                    
                    if (lines.length >= 2) {
                        const line1 = lines[lines.length - 2];
                        const line2 = lines[lines.length - 1];

                        const namePart = line1.substring(5);
                        const parts = namePart.split('<<');
                        const surname = parts[0]?.replace(/<+/g, ' ').trim() || "";
                        const givenName = parts[1]?.replace(/<+/g, ' ').trim() || "";

                        const passportNo = line2.substring(0, 9).replace(/</g, '');
                        const rawBirth = line2.substring(13, 19);
                        const birthYear = parseInt(rawBirth.substring(0, 2)) > 30 ? "19" + rawBirth.substring(0, 2) : "20" + rawBirth.substring(0, 2);
                        const dob = `${birthYear}-${rawBirth.substring(2, 4)}-${rawBirth.substring(4, 6)}`;
                        const rawExpiry = line2.substring(21, 27);
                        const expYear = 2000 + parseInt(rawExpiry.substring(0, 2));
                        const expiry = `${expYear}-${rawExpiry.substring(2, 4)}-${rawExpiry.substring(4, 6)}`;
                        const issue = `${expYear - 10}-${rawExpiry.substring(2, 4)}-${rawExpiry.substring(4, 6)}`;
                        
                        setSelectedWorker(prev => ({
                            ...prev,
                            'Surname': surname,
                            'Given Name': givenName,
                            'Full Name': `${surname} ${givenName}`.trim(),
                            'Passport No.': passportNo,
                            'Date of birth': dob,
                            'Date of Expiry': expiry,
                            'Date of issue': issue,
                            'Age': new Date().getFullYear() - parseInt(birthYear)
                        }));
                    }
                } catch (err) { alert("Scan failed."); }
                finally { setIsScanning(false); }
            };

            const handleUpdate = async () => {
                setIsSaving(true);
                try {
                    const payload = { ...selectedWorker, action: selectedWorker._row ? "update" : "addNew" };
                    await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                    alert("Sync Success! ✅");
                    await fetchData();
                    setView('list');
                } catch (e) { alert("Sync Error!"); }
                setIsSaving(false);
            };

            const filteredWorkers = useMemo(() => {
                if (!selectedBatch) return [];
                return workers.filter(w => (w.batch || w._sheetName?.replace("Batch","")) == selectedBatch)
                             .filter(w => `${w['Full Name']} ${w['ຊື່ ແລະ ນາມສະກຸນ']} ${w['District']}`.toLowerCase().includes(searchQuery.toLowerCase()));
            }, [workers, selectedBatch, searchQuery]);

            if (loading) return <div className="h-screen flex items-center justify-center font-black text-emerald-500 animate-pulse uppercase tracking-widest">Loading...</div>;

            // --- FOLDERS ---
            if (view === 'folders') return (
                <div className="max-w-md mx-auto p-6 fade-in">
                    <h1 className="text-3xl font-black italic mb-8 uppercase tracking-tighter">HSDEC Portal</h1>
                    {[...new Set(workers.map(w => w.batch || w._sheetName?.replace("Batch","")))].sort((a,b)=>a-b).map(num => (
                        <div key={num} onClick={() => { setSelectedBatch(num); setView('list'); }} className="batch-card p-6 flex justify-between items-center active:scale-95 transition-transform">
                            <span className="text-2xl font-black italic uppercase text-white">Batch {num}</span>
                            <span className="bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full text-[10px] font-black uppercase">Open List</span>
                        </div>
                    ))}
                </div>
            );

            // --- LIST (District Color Applied) ---
            if (view === 'list') return (
                <div className="max-w-md mx-auto p-6 fade-in min-h-screen">
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={() => setView('folders')} className="text-[10px] font-black text-slate-500 uppercase tracking-widest">← Back</button>
                        <button onClick={() => { setSelectedWorker({batch: selectedBatch}); setView('edit'); }} className="bg-emerald-500 text-white px-4 py-2 rounded-full font-black text-[10px] uppercase shadow-lg shadow-emerald-500/30">+ New Worker</button>
                    </div>
                    <input type="text" placeholder="Search name or district..." className="search-input mb-6" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                    <div className="space-y-3 pb-20">
                        {filteredWorkers.map((w, i) => (
                            <div key={i} onClick={() => { setSelectedWorker({...w}); setView('detail'); }} 
                                 className={`worker-item ${getDistrictColor(w['District'])} bg-white/5`}>
                                <div className="flex justify-between items-start">
                                    <div>
                                        <div className="font-black text-[10px] text-slate-500 uppercase tracking-tight">{w['Full Name'] || 'No Name'}</div>
                                        <div className="text-xs text-white font-bold mt-1">{w['ຊື່ ແລະ ນາມສະກຸນ'] || '-'}</div>
                                    </div>
                                    {w['District'] && (
                                        <span className="text-[8px] font-black bg-white/10 px-2 py-1 rounded uppercase tracking-tighter text-slate-400">
                                            {w['District']}
                                        </span>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // --- DETAIL ---
            if (view === 'detail') return (
                <div className="max-w-md mx-auto p-6 fade-in">
                    <button onClick={() => setView('list')} className="text-[10px] font-black text-slate-500 mb-6 uppercase">← Back to List</button>
                    <div className={`bg-white/5 rounded-[2.5rem] border-l-8 ${getDistrictColor(selectedWorker['District'])} border border-white/10 p-8 shadow-2xl`}>
                        <div className="mb-8 border-b border-white/10 pb-6">
                            <label className="label-style">Full Name</label>
                            <h2 className="text-3xl font-black uppercase text-emerald-500 leading-tight mb-2">{selectedWorker['Full Name']}</h2>
                            <label className="label-style">ຊື່ ແລະ ນາມສະກຸນ</label>
                            <h2 className="text-xl font-bold text-white opacity-80">{selectedWorker['ຊື່ ແລະ ນາມສະກຸນ'] || '-'}</h2>
                        </div>
                        
                        <div className="grid grid-cols-2 gap-y-6 gap-x-4">
                            {ALL_FIELDS.map(key => {
                                if (key === 'Full Name' || key === 'ຊື່ ແລະ ນາມສະກຸນ') return null;
                                let val = selectedWorker[key];
                                if (key.includes('Date') || key.includes('Expiry') || key.includes('issue')) val = formatDate(val);

                                if (key === 'Google drive' && val) {
                                    return (
                                        <div key={key} className="col-span-2 mt-4">
                                            <label className="label-style">{key}</label>
                                            <a href={val} target="_blank" rel="noopener noreferrer" className="mt-2 block w-full bg-blue-600 text-white text-center py-4 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-blue-900/40">
                                                Open Google Drive 📂
                                            </a>
                                        </div>
                                    );
                                }
                                return (
                                    <div key={key} className={key === 'District' ? 'scale-110 origin-left' : ''}>
                                        <label className={`label-style ${key === 'District' ? 'text-blue-400' : ''}`}>{key}</label>
                                        <p className={`font-bold text-sm uppercase ${key === 'District' ? 'text-white underline decoration-blue-500 decoration-2' : 'text-slate-300'} break-words`}>
                                            {String(val || '-')}
                                        </p>
                                    </div>
                                );
                            })}
                        </div>
                        
                        <button onClick={() => setView('edit')} className="w-full mt-10 bg-white/10 py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest border border-white/5">Edit ✎</button>
                    </div>
                </div>
            );

            // --- EDIT ---
            if (view === 'edit') return (
                <div className="max-w-md mx-auto p-6 fade-in">
                    {isScanning && <div className="scan-overlay"><div className="animate-bounce text-emerald-500 font-black text-xl">SCANNING...</div></div>}
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={() => setView('detail')} className="text-[10px] font-black text-slate-500 uppercase">← Cancel</button>
                        <label className="bg-white/10 border border-white/20 px-4 py-2 rounded-xl cursor-pointer">
                            <span className="text-[10px] font-black uppercase">📷 AI Scan</span>
                            <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handlePassportScan} />
                        </label>
                    </div>
                    <div className="bg-white/5 rounded-[2.5rem] border border-white/10 p-8 space-y-4 mb-20">
                        {ALL_FIELDS.map(key => {
                            if (key === 'ລໍາດັບ') return null;
                            let v = selectedWorker[key];
                            if (key.includes('Date') || key.includes('Expiry') || key.includes('issue')) v = formatDate(v);
                            return (
                                <div key={key}>
                                    <label className="label-style">{key}</label>
                                    <input className="input-edit" value={v || ''} onChange={(e) => setSelectedWorker({...selectedWorker, [key]: e.target.value})} />
                                </div>
                            );
                        })}
                        <button onClick={handleUpdate} disabled={isSaving} className="w-full bg-emerald-500 text-white py-5 rounded-2xl font-black text-sm uppercase shadow-xl mt-6">
                            {isSaving ? 'Processing...' : 'Confirm & Save 💾'}
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
