<!DOCTYPE html>
<html lang="lo">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSDEC Worker Management</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; -webkit-font-smoothing: antialiased; }
        .batch-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; transition: all 0.3s; margin-bottom: 16px; }
        .input-edit { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; font-weight: 600; font-size: 16px; margin-top: 4px; }
        .label-style { font-size: 10px; font-weight: 900; color: #10b981; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-top: 8px; }
        .search-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 12px 20px; width: 100%; color: white; font-weight: bold; outline: none; }
        .worker-item { position: relative; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; margin-bottom: 10px; cursor: pointer; }
        .border-pakngeum { border-color: #38bdf8 !important; background: rgba(56, 189, 248, 0.05); }
        .border-khounkham { border-color: #fb7185 !important; background: rgba(251, 113, 133, 0.05); }
        .scan-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        // 指定されたスプレッドシートへ接続するGAS URL
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzdAZAcryW4C9u3VE-DoBWBpBeB-lUIlxHPU3qBgq3oS2DKOr-fWuN239iNyhGTq7o0Nw/exec';

        function App() {
            const [view, setView] = useState('folders');
            const [workers, setWorkers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedBatch, setSelectedBatch] = useState(null);
            const [selectedWorker, setSelectedWorker] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');

            useEffect(() => { fetchData(); }, []);

            const fetchData = async () => {
                setLoading(true);
                try {
                    const res = await fetch(GAS_URL);
                    const data = await res.json();
                    setWorkers(data);
                } catch (e) { console.error("Fetch Error:", e); }
                setLoading(false);
            };

            const handlePassportScan = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsScanning(true);
                try {
                    const workerOCR = await Tesseract.createWorker('eng');
                    const { data: { text } } = await workerOCR.recognize(file);
                    await workerOCR.terminate();

                    const cleanText = text.toUpperCase().replace(/ /g, '');
                    const lines = cleanText.split('\n').filter(l => l.length >= 30);
                    
                    if (lines.length >= 2) {
                        const line1 = lines[lines.length - 2];
                        const line2 = lines[lines.length - 1];

                        // MRZ Parsing: Surname << GivenName
                        const namePart = line1.substring(5);
                        const parts = namePart.split('<<');
                        const surname = parts[0] ? parts[0].replace(/<+/g, ' ').trim() : "";
                        const givenName = parts[1] ? parts[1].replace(/<+/g, ' ').trim() : "";

                        const passportNo = line2.substring(0, 9).replace(/</g, '');
                        
                        // Date Parsing
                        const rawBirth = line2.substring(13, 19);
                        const birthYear = parseInt(rawBirth.substring(0, 2)) > 30 ? "19" + rawBirth.substring(0, 2) : "20" + rawBirth.substring(0, 2);
                        const dob = `${birthYear}/${rawBirth.substring(2, 4)}/${rawBirth.substring(4, 6)}`;
                        
                        const rawExpiry = line2.substring(21, 27);
                        const expYear = 2000 + parseInt(rawExpiry.substring(0, 2));
                        const expiry = `${expYear}/${rawExpiry.substring(2, 4)}/${rawExpiry.substring(4, 6)}`;
                        
                        // Calculate Issue Date (10 years prior)
                        const issue = `${expYear - 10}/${rawExpiry.substring(2, 4)}/${rawExpiry.substring(4, 6)}`;
                        
                        setSelectedWorker(prev => ({
                            ...prev,
                            'Surname': surname,
                            'Given Name': givenName,
                            'Passport No': passportNo,
                            'Date of Birth': dob,
                            'Expiry Date': expiry,
                            'Issue Date': issue,
                            'Age': new Date().getFullYear() - parseInt(birthYear)
                        }));
                        alert("Passport Scanned! ✨");
                    }
                } catch (err) { alert("Scan failed."); }
                finally { setIsScanning(false); }
            };

            const handleUpdate = async () => {
                setIsSaving(true);
                try {
                    const payload = { ...selectedWorker, action: selectedWorker._row ? "update" : "addNew" };
                    await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                    alert("Saved Successfully! ✅");
                    await fetchData();
                    setView('list');
                } catch (e) { alert("Sync Error!"); }
                setIsSaving(false);
            };

            const batchNumbers = useMemo(() => {
                return [...new Set(workers.map(w => w.batch || w._sheetName?.replace("Batch","")))].sort((a,b)=>a-b);
            }, [workers]);

            const filteredWorkers = useMemo(() => {
                if (!selectedBatch) return [];
                return workers.filter(w => (w.batch || w._sheetName?.replace("Batch","")) == selectedBatch)
                             .filter(w => `${w['Surname']} ${w['Given Name']} ${w['Name Lao']}`.toLowerCase().includes(searchQuery.toLowerCase()));
            }, [workers, selectedBatch, searchQuery]);

            if (loading) return <div className="h-screen flex items-center justify-center font-black text-emerald-500 animate-pulse uppercase tracking-widest">Loading Database...</div>;

            // FOLDERS VIEW
            if (view === 'folders') return (
                <div className="max-w-md mx-auto p-6 fade-in">
                    <h1 className="text-3xl font-black italic mb-8 uppercase tracking-tighter">HSDEC Database</h1>
                    {batchNumbers.map(num => (
                        <div key={num} onClick={() => { setSelectedBatch(num); setView('list'); }} className="batch-card p-6 flex justify-between items-center active:scale-95 transition-transform">
                            <span className="text-2xl font-black italic uppercase text-emerald-500">Batch {num}</span>
                            <span className="bg-emerald-500/10 text-emerald-400 px-3 py-1 rounded-full text-[10px] font-black uppercase">Open</span>
                        </div>
                    ))}
                </div>
            );

            // LIST VIEW
            if (view === 'list') return (
                <div className="max-w-md mx-auto p-6 fade-in min-h-screen">
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={() => setView('folders')} className="text-[10px] font-black text-slate-500 uppercase tracking-widest">← Back</button>
                        <button onClick={() => { setSelectedWorker({batch: selectedBatch}); setView('edit'); }} className="bg-emerald-500 text-white px-4 py-2 rounded-full font-black text-[10px] uppercase shadow-lg shadow-emerald-500/30">+ New Worker</button>
                    </div>
                    <input type="text" placeholder="Search name..." className="search-input mb-6" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                    <div className="space-y-3">
                        {filteredWorkers.map((w, i) => (
                            <div key={i} onClick={() => { setSelectedWorker({...w}); setView('detail'); }} className="worker-item">
                                <div className="font-black text-[10px] text-slate-500 uppercase">{w['Surname']}</div>
                                <div className="font-black text-sm uppercase text-white">{w['Given Name']}</div>
                                <div className="text-xs text-emerald-500 font-bold mt-1">{w['Name Lao'] || '-'}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // DETAIL VIEW
            if (view === 'detail') return (
                <div className="max-w-md mx-auto p-6 fade-in">
                    <button onClick={() => setView('list')} className="text-[10px] font-black text-slate-500 mb-6 uppercase tracking-widest">← Back</button>
                    <div className="bg-white/5 rounded-[2.5rem] border border-white/10 p-8 shadow-2xl">
                        <div className="mb-6 space-y-4">
                            <div>
                                <label className="label-style">Surname (姓)</label>
                                <h2 className="text-2xl font-black uppercase text-white tracking-tight">{selectedWorker['Surname'] || '-'}</h2>
                            </div>
                            <div>
                                <label className="label-style">Given Name (名)</label>
                                <h2 className="text-2xl font-black uppercase text-white tracking-tight">{selectedWorker['Given Name'] || '-'}</h2>
                            </div>
                            <div className="pt-2 border-t border-white/10">
                                <label className="label-style">Name Lao (心情ネーム)</label>
                                <h2 className="text-xl font-bold text-emerald-400">{selectedWorker['Name Lao'] || '-'}</h2>
                            </div>
                        </div>
                        <div className="grid grid-cols-2 gap-4 pt-4 border-t border-white/10">
                            {['Sex', 'Age', 'Passport No', 'Issue Date', 'Expiry Date', 'Village', 'District', 'Date of Birth'].map(key => (
                                <div key={key}>
                                    <label className="label-style">{key}</label>
                                    <p className="font-bold text-sm uppercase text-slate-300">{selectedWorker[key] || '-'}</p>
                                </div>
                            ))}
                        </div>
                        <button onClick={() => setView('edit')} className="w-full mt-8 bg-white/10 py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest">Edit Profile ✎</button>
                    </div>
                </div>
            );

            // EDIT VIEW
            if (view === 'edit') return (
                <div className="max-w-md mx-auto p-6 fade-in">
                    {isScanning && <div className="scan-overlay"><div className="animate-bounce text-emerald-500 font-black text-xl tracking-tighter">AI SCANNING...</div></div>}
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={() => setView('list')} className="text-[10px] font-black text-slate-500 uppercase tracking-widest">← Cancel</button>
                        <label className="bg-white/10 border border-white/20 px-4 py-2 rounded-xl cursor-pointer active:scale-95 transition-all">
                            <span className="text-[10px] font-black uppercase tracking-widest">📷 AI Scanner</span>
                            <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handlePassportScan} />
                        </label>
                    </div>
                    <div className="bg-white/5 rounded-[2.5rem] border border-white/10 p-8 space-y-4">
                        <div className="grid grid-cols-2 gap-4">
                            <div>
                                <label className="label-style">Surname</label>
                                <input className="input-edit" value={selectedWorker['Surname'] || ''} onChange={(e) => setSelectedWorker({...selectedWorker, 'Surname': e.target.value})} />
                            </div>
                            <div>
                                <label className="label-style">Given Name</label>
                                <input className="input-edit" value={selectedWorker['Given Name'] || ''} onChange={(e) => setSelectedWorker({...selectedWorker, 'Given Name': e.target.value})} />
                            </div>
                        </div>
                        {['Name Lao', 'Sex', 'Age', 'Passport No', 'Issue Date', 'Expiry Date', 'Village', 'District', 'Date of Birth'].map(key => (
                            <div key={key}>
                                <label className="label-style">{key}</label>
                                <input className="input-edit" value={selectedWorker[key] || ''} onChange={(e) => setSelectedWorker({...selectedWorker, [key]: e.target.value})} />
                            </div>
                        ))}
                        <button onClick={handleUpdate} disabled={isSaving} className="w-full bg-emerald-500 text-white py-5 rounded-2xl font-black text-sm uppercase shadow-xl active:scale-95 transition-all mt-4">
                            {isSaving ? 'Saving...' : 'Confirm & Sync 💾'}
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
