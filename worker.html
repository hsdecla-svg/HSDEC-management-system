<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSDEC Worker Management</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; color: #1e293b; -webkit-font-smoothing: antialiased; }
        
        /* スクショのようなカードスタイル */
        .glass-panel { background: white; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .nav-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        
        /* 入力項目のスタイル */
        .input-field { background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 12px 16px; width: 100%; color: #1e293b; font-weight: 600; outline: none; transition: all 0.2s; }
        .input-field:focus { border-color: #10b981; background: white; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
        
        .label-text { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: block; }
        
        /* テーブル・リスト */
        .row-hover:hover { background-color: #f8fafc; }
        .status-badge { padding: 4px 10px; border-radius: 99px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* スクロールバー非表示（モダンな見た目のため） */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        window.loadTesseract = function() {
            if (window.Tesseract) return Promise.resolve();
            return new Promise((resolve) => {
                const s = document.createElement('script');
                s.src = "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
                s.onload = resolve;
                document.head.appendChild(s);
            });
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxqFW8-GkEPJTDiXx0X4EprWfCZqih40CDWXQCY1gEozWyFov4zKtmXzUUyTL_U26zJXw/exec';
        
        const ALL_FIELDS = ['ລໍາດັບ', 'ສະຖານະ', 'Re-entry', 'ຊື່ ແລະ ນາມສະກຸນ', 'Full Name', 'Sex', 'Date of birth', 'Age', 'Passport No.', 'Date of issue', 'Date of Expiry', 'Village', 'District', 'Province', 'Size', 'AC - Name', 'AC - No', 'Google drive'];
        
        const formatDate = (val) => { if (!val) return ''; const s = String(val); return s.includes('T') ? s.split('T')[0] : s; };

        function App() {
            const [view, setView] = useState('folders');
            const [workers, setWorkers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedBatch, setSelectedBatch] = useState(null);
            const [selectedWorker, setSelectedWorker] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [masterOptions, setMasterOptions] = useState({ provinces: [], provinceMap: {}, Sex: [], Status: [], Size: [] });

            useEffect(() => { fetchData(); }, []);

            const fetchData = async () => {
                setLoading(true);
                try {
                    const res = await fetch(GAS_URL);
                    const json = await res.json();
                    setWorkers(json.workers || []);
                    setMasterOptions(json.options || { provinces: [], provinceMap: {}, Sex: [], Status: [], Size: [] });
                } catch (e) { console.error(e); }
                setLoading(false);
            };

            const handlePassportScan = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsScanning(true);
                try {
                    await window.loadTesseract();
                    const workerOCR = await Tesseract.createWorker('eng');
                    const { data: { text } } = await workerOCR.recognize(file);
                    await workerOCR.terminate();
                    const cleanText = text.toUpperCase().replace(/ /g, '');
                    const lines = cleanText.split('\n').filter(l => l.length >= 30);
                    if (lines.length >= 2) {
                        const line1 = lines[lines.length - 2];
                        const line2 = lines[lines.length - 1];
                        const namePart = line1.substring(5);
                        const parts = namePart.split('<<');
                        const surname = parts[0]?.replace(/<+/g, ' ').trim() || "";
                        const givenName = parts[1]?.replace(/<+/g, ' ').trim() || "";
                        const passportNo = line2.substring(0, 9).replace(/</g, '');
                        const rawBirth = line2.substring(13, 19);
                        const birthYear = parseInt(rawBirth.substring(0, 2)) > 30 ? "19" + rawBirth.substring(0, 2) : "20" + rawBirth.substring(0, 2);
                        const rawExpiry = line2.substring(21, 27);
                        const expYear = 2000 + parseInt(rawExpiry.substring(0, 2));
                        setSelectedWorker(prev => ({
                            ...prev, 
                            'Full Name': `${surname} ${givenName}`.trim(), 
                            'Passport No.': passportNo, 
                            'Date of birth': `${birthYear}-${rawBirth.substring(2, 4)}-${rawBirth.substring(4, 6)}`, 
                            'Date of Expiry': `${expYear}-${rawExpiry.substring(2, 4)}-${rawExpiry.substring(4, 6)}`, 
                            'Date of issue': `${expYear - 10}-${rawExpiry.substring(2, 4)}-${rawExpiry.substring(4, 6)}`, 
                            'Age': new Date().getFullYear() - parseInt(birthYear)
                        }));
                    }
                } catch (err) { alert("Scan fail"); } finally { setIsScanning(false); }
            };

            const handleUpdate = async () => {
                setIsSaving(true);
                try {
                    const payload = { ...selectedWorker, action: selectedWorker._row ? "update" : "addNew" };
                    await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                    alert("Data Saved Successfully!");
                    await fetchData();
                    setView('list');
                } catch (e) { alert("Save Error"); }
                setIsSaving(false);
            };

            const filteredWorkers = useMemo(() => {
                if (!selectedBatch) return [];
                return workers
                    .filter(w => (w.batch || w._sheetName?.replace("Batch","")) == selectedBatch)
                    .filter(w => `${w['Full Name']} ${w['ຊື່ ແລະ ນາມສະກຸນ']}`.toLowerCase().includes(searchQuery.toLowerCase()));
            }, [workers, selectedBatch, searchQuery]);

            const StatsRow = () => (
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    <div className="glass-panel p-4">
                        <span className="label-text">Total Records</span>
                        <span className="text-2xl font-extrabold">{filteredWorkers.length}</span>
                    </div>
                    <div className="glass-panel p-4">
                        <span className="label-text text-emerald-600">Active Batch</span>
                        <span className="text-2xl font-extrabold text-emerald-700">{selectedBatch}</span>
                    </div>
                </div>
            );

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white">
                    <div className="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <div className="font-bold tracking-widest animate-pulse">HSDEC SYSTEM CONNECTING...</div>
                </div>
            );

            // --- FOLDER VIEW ---
            if (view === 'folders') return (
                <div className="fade-in max-w-4xl mx-auto p-6">
                    <header className="mb-10 text-center">
                        <h1 className="text-4xl font-extrabold text-slate-900 tracking-tighter">HSDEC PORTAL</h1>
                        <p className="text-slate-500 font-medium">Labor Export Management System</p>
                    </header>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {[...new Set(workers.map(w => w.batch || w._sheetName?.replace("Batch","")))].sort((a,b)=>a-b).map(num => (
                            <div key={num} onClick={() => { setSelectedBatch(num); setView('list'); }} 
                                 className="glass-panel p-6 flex justify-between items-center cursor-pointer hover:border-emerald-500 hover:shadow-xl transition-all group">
                                <div>
                                    <h3 className="text-xl font-bold text-slate-800 group-hover:text-emerald-600 transition-colors">Batch Group {num}</h3>
                                    <p className="text-sm text-slate-400">Total {workers.filter(w => (w.batch || w._sheetName?.replace("Batch","")) == num).length} Workers</p>
                                </div>
                                <div className="bg-slate-50 p-3 rounded-xl group-hover:bg-emerald-50 text-slate-400 group-hover:text-emerald-500">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="9 5l7 7-7 7" /></svg>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // --- LIST VIEW ---
            if (view === 'list') return (
                <div className="fade-in max-w-5xl mx-auto p-4 md:p-8 pb-20">
                    <div className="flex justify-between items-center mb-8">
                        <div>
                            <button onClick={() => setView('folders')} className="text-sm font-bold text-emerald-600 mb-1 flex items-center gap-1">
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" strokeWidth="3" /></svg> BACK TO BATCHES
                            </button>
                            <h2 className="text-2xl font-extrabold text-slate-900">Worker List - Batch {selectedBatch}</h2>
                        </div>
                        <button onClick={() => { setSelectedWorker({batch: selectedBatch}); setView('edit'); }} 
                                className="bg-slate-900 text-white px-6 py-3 rounded-2xl font-bold text-sm shadow-lg hover:bg-emerald-600 transition-all">
                            + ADD WORKER
                        </button>
                    </div>

                    <StatsRow />

                    <div className="glass-panel mb-6 flex items-center px-4">
                        <svg className="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" strokeWidth="3" /></svg>
                        <input type="text" placeholder="Search by name..." className="w-full p-4 bg-transparent outline-none font-semibold text-slate-700" 
                               value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                    </div>

                    <div className="glass-panel overflow-hidden">
                        <table className="w-full text-left">
                            <thead className="bg-slate-50 border-b border-slate-100">
                                <tr>
                                    <th className="p-4 label-text">No.</th>
                                    <th className="p-4 label-text">Worker Identity</th>
                                    <th className="p-4 label-text hidden md:table-cell">Gender</th>
                                    <th className="p-4 label-text hidden md:table-cell">Passport</th>
                                    <th className="p-4 label-text">Status</th>
                                    <th className="p-4 text-right"></th>
                                </tr>
                            </thead>
                            <tbody>
                                {filteredWorkers.map((w, i) => (
                                    <tr key={i} onClick={() => { setSelectedWorker({...w}); setView('detail'); }} 
                                        className="row-hover border-b border-slate-50 cursor-pointer transition-colors">
                                        <td className="p-4 font-bold text-slate-400">#{w['ລໍາດັບ'] || '-'}</td>
                                        <td className="p-4">
                                            <div className="font-extrabold text-slate-900">{w['Full Name']}</div>
                                            <div className="text-xs text-slate-400 font-medium">{w['ຊື່ ແລະ ນາມສະກຸນ']}</div>
                                        </td>
                                        <td className="p-4 text-sm font-semibold text-slate-600 hidden md:table-cell">{w['Sex']}</td>
                                        <td className="p-4 text-sm font-mono text-slate-500 hidden md:table-cell">{w['Passport No.']}</td>
                                        <td className="p-4">
                                            <span className={`status-badge ${w['ສະຖານະ'] === 'Ready' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-600'}`}>
                                                {w['ສະຖານະ'] || 'Wait'}
                                            </span>
                                        </td>
                                        <td className="p-4 text-right text-slate-300">
                                            <svg className="w-5 h-5 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" strokeWidth="3" /></svg>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );

            // --- EDIT / ADD VIEW ---
            if (view === 'edit') {
                const renderField = (key) => {
                    let v = selectedWorker[key]; if (key.includes('Date') || key.includes('Expiry') || key.includes('issue')) v = formatDate(v);
                    
                    if (key === 'Re-entry') return (
                        <div key={key} className="flex items-center justify-between p-4 glass-panel bg-slate-50 mt-4">
                            <label className="label-text mb-0 text-emerald-700">Re-entry Worker</label>
                            <input type="checkbox" className="w-6 h-6 accent-emerald-500" checked={v === true || v === 'TRUE'} 
                                   onChange={(e) => setSelectedWorker({...selectedWorker, [key]: e.target.checked})} />
                        </div>
                    );

                    const masterKeyMap = { "Province": "provinces", "Sex": "Sex", "ສະຖານະ": "Status", "Size": "Size" };
                    if (masterKeyMap[key] || key === 'District') {
                        let list = key === 'Province' ? masterOptions.provinces : (key === 'District' ? masterOptions.provinceMap[selectedWorker.Province] || [] : masterOptions[masterKeyMap[key]] || []);
                        return (
                            <div key={key} className="mb-4">
                                <label className="label-text">{key}</label>
                                <select className="input-field" value={v || ''} 
                                    onChange={(e) => {
                                        const val = e.target.value;
                                        if(key === 'Province') {
                                            const dists = masterOptions.provinceMap[val] || [];
                                            setSelectedWorker({...selectedWorker, Province: val, District: dists.length === 1 ? dists[0] : ''});
                                        } else {
                                            setSelectedWorker({...selectedWorker, [key]: val});
                                        }
                                    }} disabled={key === 'District' && !selectedWorker.Province}>
                                    <option value="">Select Option</option>
                                    {list.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                </select>
                            </div>
                        );
                    }

                    return (
                        <div key={key} className="mb-4">
                            <label className="label-text">{key}</label>
                            <input className="input-field" type={key.includes('Date') ? 'date' : 'text'} value={v || ''} 
                                   onChange={(e) => setSelectedWorker({...selectedWorker, [key]: e.target.value})} />
                        </div>
                    );
                };

                return (
                    <div className="fade-in max-w-2xl mx-auto p-4 md:p-8 pb-32">
                        {isScanning && (
                            <div className="fixed inset-0 bg-white/90 z-50 flex flex-col items-center justify-center backdrop-blur-sm">
                                <div className="w-20 h-2 bg-slate-100 rounded-full overflow-hidden mb-4">
                                    <div className="h-full bg-emerald-500 animate-progress w-full origin-left"></div>
                                </div>
                                <p className="font-black text-slate-800 animate-pulse uppercase tracking-tighter">AI Passport Analyzing...</p>
                            </div>
                        )}
                        <div className="flex justify-between items-center mb-6">
                            <button onClick={() => setView('list')} className="text-sm font-bold text-slate-400 uppercase">← Cancel</button>
                            <div className="text-sm font-extrabold text-emerald-600 uppercase tracking-widest">Editor Mode</div>
                        </div>

                        {/* OCR SCANNER BOX */}
                        <div className="glass-panel p-8 mb-8 text-center bg-slate-900 border-none relative overflow-hidden">
                            <div className="relative z-10">
                                <p className="text-emerald-400 text-[10px] font-black uppercase mb-2">Efficiency Tool</p>
                                <h3 className="text-white font-extrabold text-xl mb-4">Automatic Passport Scan</h3>
                                <label className="inline-block bg-emerald-500 text-white px-10 py-4 rounded-2xl cursor-pointer shadow-xl hover:bg-emerald-400 active:scale-95 transition-all font-extrabold text-sm">
                                    TAKE PHOTO / UPLOAD
                                    <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handlePassportScan} />
                                </label>
                            </div>
                            <div className="absolute top-0 right-0 p-4 opacity-10">
                                <svg className="w-32 h-32 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M3 5v4h2V5h4V3H5c-1.1 0-2 .9-2 2zm2 10H3v4c0 1.1.9 2 2 2h4v-2H5v-4zm14 4h-4v2h4c1.1 0 2-.9 2-2v-4h-2v4zm0-14h-4V3h4c1.1 0 2 .9 2 2v4h-2V5z"/></svg>
                            </div>
                        </div>

                        <div className="space-y-6">
                            <div className="glass-panel p-6">
                                <h3 className="text-slate-900 font-extrabold mb-6 border-b pb-2">1. Personal Information</h3>
                                {['ຊື່ ແລະ ນາມສະກຸນ', 'Full Name', 'Sex', 'Date of birth', 'Age', 'ສະຖານະ', 'Size', 'Re-entry'].map(renderField)}
                            </div>
                            <div className="glass-panel p-6">
                                <h3 className="text-slate-900 font-extrabold mb-6 border-b pb-2">2. Passport & Identity</h3>
                                {['Passport No.', 'Date of issue', 'Date of Expiry'].map(renderField)}
                            </div>
                            <div className="glass-panel p-6">
                                <h3 className="text-slate-900 font-extrabold mb-6 border-b pb-2">3. Address & Contact</h3>
                                {['Province', 'District', 'Village'].map(renderField)}
                            </div>
                            <div className="glass-panel p-6">
                                <h3 className="text-slate-900 font-extrabold mb-6 border-b pb-2">4. Support Details</h3>
                                {['AC - Name', 'AC - No', 'Google drive'].map(renderField)}
                            </div>
                        </div>

                        <div className="fixed bottom-0 left-0 w-full p-4 bg-white/80 backdrop-blur-md border-t border-slate-200 z-40">
                            <button onClick={handleUpdate} disabled={isSaving} 
                                    className="max-w-2xl mx-auto block w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-lg uppercase shadow-2xl hover:bg-emerald-600 disabled:opacity-50 transition-all">
                                {isSaving ? 'Syncing...' : 'Save Worker Profile'}
                            </button>
                        </div>
                    </div>
                );
            }

            // --- DETAIL VIEW ---
            if (view === 'detail') {
                const Item = ({ label, value }) => (
                    <div className="py-3 border-b border-slate-50 last:border-0">
                        <span className="label-text">{label}</span>
                        <span className="text-slate-900 font-extrabold text-lg">{String(value || '-')}</span>
                    </div>
                );
                return (
                    <div className="fade-in max-w-2xl mx-auto p-4 md:p-8 pb-20">
                        <div className="flex justify-between items-center mb-6">
                            <button onClick={() => setView('list')} className="text-sm font-bold text-slate-400 uppercase">← List</button>
                            <button onClick={() => setView('edit')} className="bg-emerald-50 text-emerald-600 px-4 py-2 rounded-xl font-extrabold text-xs">EDIT PROFILE ✎</button>
                        </div>

                        <div className="mb-10">
                            <span className="label-text text-emerald-500">Worker Profile</span>
                            <h2 className="text-4xl font-extrabold text-slate-900 tracking-tighter leading-tight">
                                {selectedWorker['Full Name']}
                            </h2>
                            <p className="text-xl font-bold text-slate-400 italic">{selectedWorker['ຊື່ ແລະ ນາມສະກຸນ']}</p>
                        </div>

                        <div className="space-y-6">
                            <div className="glass-panel p-6">
                                <Item label="Current Status" value={selectedWorker['ສະຖານະ']} />
                                <div className="grid grid-cols-2 gap-4">
                                    <Item label="Gender" value={selectedWorker['Sex']} />
                                    <Item label="Uniform Size" value={selectedWorker['Size']} />
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <Item label="Birth Date" value={formatDate(selectedWorker['Date of birth'])} />
                                    <Item label="Current Age" value={selectedWorker['Age']} />
                                </div>
                                <Item label="Re-entry Program" value={selectedWorker['Re-entry'] ? 'Authorized ✅' : 'Normal'} />
                            </div>

                            <div className="glass-panel p-6 bg-slate-900 text-white">
                                <h3 className="label-text text-emerald-400 opacity-100">Official Document</h3>
                                <Item label="Passport Number" value={selectedWorker['Passport No.']} />
                                <div className="grid grid-cols-2 gap-4 border-t border-white/10 mt-2 pt-2">
                                    <div className="text-white"><Item label="Issue Date" value={formatDate(selectedWorker['Date of issue'])} /></div>
                                    <div className="text-white"><Item label="Expiry Date" value={formatDate(selectedWorker['Date of Expiry'])} /></div>
                                </div>
                            </div>

                            <div className="glass-panel p-6">
                                <h3 className="label-text">Origin Location</h3>
                                <Item label="Province" value={selectedWorker['Province']} />
                                <Item label="District" value={selectedWorker['District']} />
                                <Item label="Village" value={selectedWorker['Village']} />
                            </div>

                            {selectedWorker['Google drive'] && (
                                <a href={selectedWorker['Google drive']} target="_blank" 
                                   className="block w-full text-center bg-white border-2 border-slate-200 py-6 rounded-2xl font-black text-slate-900 hover:bg-slate-50 transition-all shadow-sm">
                                    VIEW CLOUD DOCUMENTS 📂
                                </a>
                            )}
                        </div>
                    </div>
                );
            }
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
