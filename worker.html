<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSDEC Worker Management</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; color: #1e293b; -webkit-font-smoothing: antialiased; }
        .glass-panel { background: white; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .input-field { background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 12px 16px; width: 100%; color: #1e293b; font-weight: 600; outline: none; transition: all 0.2s; }
        .input-field:focus { border-color: #10b981; background: white; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
        .label-text { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; display: block; }
        .status-badge { padding: 4px 10px; border-radius: 99px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        window.loadTesseract = function() {
            if (window.Tesseract) return Promise.resolve();
            return new Promise((resolve) => {
                const s = document.createElement('script');
                s.src = "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
                s.onload = resolve;
                document.head.appendChild(s);
            });
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        // 新しいGAS URL
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzvHbVjc_1XaVT54dkLTfWlIccAoUWsiERzPbOSnPSvLMazkitGOTzkim7hcHzxrRP9gQ/exec';
        
        // GAS側の colMapping と完全に一致させる（列順に準拠）
        const ALL_FIELDS = [
            'ລໍາດັບ', 'ສະຖານະ', 'Re-entry', 'ຊື່ ແລະ ນາມສະກຸນ', 'Full Name', 'Sex', 'Date of birth', 'Age', 
            'Passport No.', 'Date of issue', 'Date of Expiry', 
            'Village', 'District', 'Province', 'Size', 'Google drive'
        ];
        
        const formatDateInternational = (val) => {
            if (!val || val === '-' || val === 'null') return '-';
            const s = String(val);
            const datePart = s.includes('T') ? s.split('T')[0] : s;
            const parts = datePart.split(/[-/.]/);
            if (parts.length === 3) {
                if (parts[0].length === 4) return `${parts[2]}/${parts[1]}/${parts[0]}`; // YYYY-MM-DD -> DD/MM/YYYY
                if (parts[2].length === 4) return `${parts[0]}/${parts[1]}/${parts[2]}`; // DD/MM/YYYY
            }
            return datePart;
        };

        function App() {
            const [view, setView] = useState('folders');
            const [workers, setWorkers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedBatch, setSelectedBatch] = useState(null);
            const [selectedWorker, setSelectedWorker] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [masterOptions, setMasterOptions] = useState({ provinces: [], provinceMap: {}, Sex: [], Status: [], Size: [] });

            useEffect(() => { fetchData(); }, []);

            const fetchData = async () => {
                setLoading(true);
                try {
                    const res = await fetch(GAS_URL);
                    const json = await res.json();
                    setWorkers(json.workers || []);
                    setMasterOptions(json.options || { provinces: [], provinceMap: {}, Sex: [], Status: [], Size: [] });
                } catch (e) { console.error(e); }
                setLoading(false);
            };

            const getVal = (worker, key) => {
                if (!worker || !key) return '-';
                return worker[key] !== undefined && worker[key] !== null && worker[key] !== '' ? worker[key] : '-';
            };

            const handlePassportScan = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsScanning(true);
                try {
                    await window.loadTesseract();
                    const workerOCR = await Tesseract.createWorker('eng');
                    const { data: { text } } = await workerOCR.recognize(file);
                    await workerOCR.terminate();
                    const cleanText = text.toUpperCase().replace(/ /g, '');
                    const lines = cleanText.split('\n').filter(l => l.length >= 30);
                    if (lines.length >= 2) {
                        const line1 = lines[lines.length - 2];
                        const line2 = lines[lines.length - 1];
                        const namePart = line1.substring(5);
                        const parts = namePart.split('<<');
                        const surname = parts[0]?.replace(/<+/g, ' ').trim() || "";
                        const givenName = parts[1]?.replace(/<+/g, ' ').trim() || "";
                        const passportNo = line2.substring(0, 9).replace(/</g, '');
                        const rawBirth = line2.substring(13, 19);
                        const birthYear = parseInt(rawBirth.substring(0, 2)) > 30 ? "19" + rawBirth.substring(0, 2) : "20" + rawBirth.substring(0, 2);
                        const rawExpiry = line2.substring(21, 27);
                        const expYear = 2000 + parseInt(rawExpiry.substring(0, 2));

                        const updated = { ...selectedWorker };
                        updated['Full Name'] = `${surname} ${givenName}`.trim();
                        updated['Passport No.'] = passportNo;
                        updated['Date of birth'] = `${birthYear}-${rawBirth.substring(2, 4)}-${rawBirth.substring(4, 6)}`;
                        updated['Date of Expiry'] = `${expYear}-${rawExpiry.substring(2, 4)}-${rawExpiry.substring(4, 6)}`;
                        updated['Date of issue'] = `${expYear - 10}-${rawExpiry.substring(2, 4)}-${rawExpiry.substring(4, 6)}`;
                        updated['Age'] = new Date().getFullYear() - parseInt(birthYear);
                        setSelectedWorker(updated);
                    }
                } catch (err) { alert("Scan fail"); } finally { setIsScanning(false); }
            };

            const handleUpdate = async () => {
                setIsSaving(true);
                try {
                    const payload = { ...selectedWorker, action: selectedWorker._row ? "update" : "addNew" };
                    await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                    alert("Saved! ✅");
                    await fetchData();
                    setView('list');
                } catch (e) { alert("Save Error"); }
                setIsSaving(false);
            };

            const filteredWorkers = useMemo(() => {
                if (!selectedBatch) return [];
                return workers
                    .filter(w => (w.batch || w._sheetName?.replace("Batch","")) == selectedBatch)
                    .filter(w => `${getVal(w, 'Full Name')} ${getVal(w, 'ຊື່ ແລະ ນາມສະກຸນ')} ${getVal(w, 'Passport No.')}`.toLowerCase().includes(searchQuery.toLowerCase()));
            }, [workers, selectedBatch, searchQuery]);

            if (loading) return <div className="h-screen flex items-center justify-center font-bold text-slate-900 animate-pulse text-lg tracking-widest italic">HSDEC SYSTEM LOADING...</div>;

            if (view === 'folders') return (
                <div className="fade-in max-w-4xl mx-auto p-6">
                    <header className="mb-10 text-center">
                        <h1 className="text-4xl font-extrabold text-slate-900 tracking-tighter italic">HSDEC Database</h1>
                        <p className="text-slate-400 font-bold uppercase text-[10px] tracking-widest mt-1">Management Portal</p>
                    </header>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                        {[...new Set(workers.map(w => w.batch || w._sheetName?.replace("Batch","")))].sort((a,b)=>a-b).map(num => (
                            <div key={num} onClick={() => { setSelectedBatch(num); setView('list'); }} 
                                 className="glass-panel p-8 flex justify-between items-center cursor-pointer hover:border-emerald-400 transition-all active:scale-95 group">
                                <span className="text-2xl font-black text-slate-800 tracking-tight">Batch {num}</span>
                                <span className="bg-slate-100 text-slate-400 px-5 py-2 rounded-full text-[10px] font-black uppercase group-hover:bg-emerald-500 group-hover:text-white transition-colors">Enter Batch</span>
                            </div>
                        ))}
                    </div>
                </div>
            );

            if (view === 'list') return (
                <div className="fade-in max-w-5xl mx-auto p-4 md:p-8 pb-20">
                    <div className="flex justify-between items-center mb-8">
                        <button onClick={() => setView('folders')} className="text-xs font-black text-slate-400 uppercase tracking-widest">← Batches</button>
                        <button onClick={() => { setSelectedWorker({batch: selectedBatch}); setView('edit'); }} className="bg-slate-900 text-white px-8 py-3 rounded-2xl font-black text-[10px] uppercase shadow-xl">+ New Worker</button>
                    </div>
                    <div className="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-8 px-2">
                        <div>
                            <h2 className="text-4xl font-black text-slate-900 tracking-tighter italic">Batch {selectedBatch}</h2>
                            <p className="text-slate-400 font-bold text-[10px] uppercase">Registered Workers List</p>
                        </div>
                        <input type="text" placeholder="Search by name or passport..." className="glass-panel p-4 w-full md:w-80 outline-none text-sm font-bold" 
                               value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                    </div>
                    <div className="glass-panel overflow-hidden border-none shadow-2xl">
                        <table className="w-full text-left">
                            <thead className="bg-slate-900 text-white/50">
                                <tr>
                                    <th className="p-5 text-[10px] font-black uppercase tracking-widest">Worker</th>
                                    <th className="p-5 text-[10px] font-black uppercase tracking-widest hidden md:table-cell">Passport</th>
                                    <th className="p-5 text-[10px] font-black uppercase tracking-widest">Status</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {filteredWorkers.map((w, i) => (
                                    <tr key={i} onClick={() => { setSelectedWorker({...w}); setView('detail'); }} 
                                        className="cursor-pointer hover:bg-emerald-50/50 transition-colors">
                                        <td className="p-5">
                                            <div className="font-black text-slate-900 text-lg leading-tight">{getVal(w, 'Full Name')}</div>
                                            <div className="text-[11px] text-emerald-600 font-bold italic">{getVal(w, 'ຊື່ ແລະ ນາມສະກຸນ')}</div>
                                        </td>
                                        <td className="p-5 hidden md:table-cell font-bold text-slate-400 text-sm">{getVal(w, 'Passport No.')}</td>
                                        <td className="p-5">
                                            <span className={`status-badge ${getVal(w, 'ສະຖານະ') === 'Ready' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'}`}>
                                                {getVal(w, 'ສະຖານະ') || 'Wait'}
                                            </span>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );

            if (view === 'detail') {
                const Item = ({ label, keyName, isDate = false }) => (
                    <div className="py-4 border-b border-slate-50 last:border-0 flex justify-between items-center gap-4">
                        <span className="label-text mb-0 w-1/3 text-[10px]">{label}</span>
                        <span className="text-slate-900 font-bold text-right flex-grow truncate text-sm">
                            {isDate ? formatDateInternational(getVal(selectedWorker, keyName)) : String(getVal(selectedWorker, keyName))}
                        </span>
                    </div>
                );

                return (
                    <div className="fade-in max-w-2xl mx-auto p-4 md:p-8 pb-24">
                        <div className="flex justify-between items-center mb-10">
                            <button onClick={() => setView('list')} className="text-[10px] font-black text-slate-400 uppercase tracking-widest">← Back to List</button>
                            <button onClick={() => setView('edit')} className="bg-slate-900 text-white px-6 py-2 rounded-xl font-black text-[10px] uppercase shadow-lg">Edit ✎</button>
                        </div>

                        <div className="mb-10 px-2">
                            <h2 className="text-4xl font-black text-slate-900 tracking-tighter leading-none mb-2">{getVal(selectedWorker, 'Full Name')}</h2>
                            <p className="text-xl font-bold text-emerald-500 italic tracking-tight">{getVal(selectedWorker, 'ຊື່ ແລະ ນາມສະກຸນ')}</p>
                        </div>

                        <div className="space-y-6">
                            <div className="glass-panel p-8 bg-slate-900 text-white shadow-2xl relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-4 opacity-10 font-black text-6xl italic">PASS</div>
                                <h3 className="text-emerald-400 text-[10px] font-black uppercase tracking-widest mb-8 border-b border-white/10 pb-2">Passport Information</h3>
                                <div className="space-y-8 relative z-10">
                                    <div>
                                        <label className="text-[10px] font-black text-white/30 uppercase tracking-widest">Passport No.</label>
                                        <div className="text-3xl font-black tracking-[0.2em] text-emerald-50">{getVal(selectedWorker, 'Passport No.')}</div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-8 border-t border-white/5 pt-6">
                                        <div>
                                            <label className="text-[10px] font-black text-white/30 uppercase tracking-widest">Date of issue</label>
                                            <div className="font-bold text-lg">{formatDateInternational(getVal(selectedWorker, 'Date of issue'))}</div>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-white/30 uppercase tracking-widest">Date of Expiry</label>
                                            <div className="font-bold text-lg text-rose-400">{formatDateInternational(getVal(selectedWorker, 'Date of Expiry'))}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="glass-panel p-8">
                                <h3 className="text-slate-900 text-[10px] font-black uppercase mb-4 border-b border-slate-50 pb-2 tracking-widest">Personal Details</h3>
                                <Item label="Status" keyName="ສະຖານະ" />
                                <Item label="Sex" keyName="Sex" />
                                <Item label="Birthday" keyName="Date of birth" isDate={true} />
                                <Item label="Age" keyName="Age" />
                                <Item label="Village" keyName="Village" />
                                <Item label="District" keyName="District" />
                                <Item label="Province" keyName="Province" />
                                <Item label="Uniform Size" keyName="Size" />
                                <div className="py-4 flex justify-between items-center border-t border-slate-50 mt-4">
                                    <span className="label-text text-[10px]">Google Drive</span>
                                    <a href={getVal(selectedWorker, 'Google drive')} target="_blank" className="bg-blue-50 text-blue-600 px-4 py-2 rounded-lg font-black text-[10px] uppercase">Open Link ↗</a>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'edit') {
                const renderField = (key) => {
                    let v = getVal(selectedWorker, key);
                    const inputStyle = "input-field";
                    
                    if (key === 'Re-entry') return (
                        <div key={key} className="flex items-center justify-between p-5 glass-panel bg-slate-50 mt-4">
                            <label className="label-text mb-0 font-black">Re-entry Program</label>
                            <input type="checkbox" className="w-6 h-6 accent-emerald-500" checked={v === true || v === 'TRUE'} 
                                   onChange={(e) => setSelectedWorker({...selectedWorker, [key]: e.target.checked})} />
                        </div>
                    );

                    const masterKeyMap = { "Province": "provinces", "Sex": "Sex", "ສະຖານະ": "Status", "Size": "Size" };
                    if (masterKeyMap[key] || key === 'District') {
                        let list = key === 'Province' ? masterOptions.provinces : (key === 'District' ? masterOptions.provinceMap[getVal(selectedWorker, 'Province')] || [] : masterOptions[masterKeyMap[key]] || []);
                        return (
                            <div key={key} className="mb-5">
                                <label className="label-text">{key}</label>
                                <select className={inputStyle} value={v === '-' ? '' : v} 
                                    onChange={(e) => {
                                        const val = e.target.value;
                                        if(key === 'Province') {
                                            const dists = masterOptions.provinceMap[val] || [];
                                            setSelectedWorker({...selectedWorker, Province: val, District: dists.length === 1 ? dists[0] : ''});
                                        } else {
                                            setSelectedWorker({...selectedWorker, [key]: val});
                                        }
                                    }}>
                                    <option value="">Select Option</option>
                                    {list.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                </select>
                            </div>
                        );
                    }

                    if (key === 'Google drive') return null; // 編集不可

                    return (
                        <div key={key} className="mb-5">
                            <label className="label-text">{key}</label>
                            <input className={inputStyle} 
                                   type={key.includes('Date') || key.includes('Expiry') || key.includes('issue') ? 'date' : (key === 'Age' ? 'number' : 'text')} 
                                   value={v === '-' ? '' : (key.includes('Date') || key.includes('Expiry') || key.includes('issue') ? String(v).split('T')[0] : v)} 
                                   onChange={(e) => setSelectedWorker({...selectedWorker, [key]: e.target.value})} />
                        </div>
                    );
                };

                return (
                    <div className="fade-in max-w-2xl mx-auto p-4 md:p-8 pb-32">
                        {isScanning && <div className="fixed inset-0 bg-white/90 z-50 flex flex-col items-center justify-center font-black animate-pulse text-emerald-600">AI SCANNING...</div>}
                        <div className="flex justify-between items-center mb-8">
                            <button onClick={() => setView('list')} className="text-xs font-black text-slate-400 uppercase tracking-widest">Cancel</button>
                            <h3 className="text-[10px] font-black text-slate-900 uppercase tracking-widest">Edit Worker Details</h3>
                        </div>
                        <div className="glass-panel p-8 mb-8 text-center bg-slate-900 shadow-xl">
                            <p className="text-white/40 text-[9px] font-black uppercase mb-4 tracking-widest">Automatic Data Entry</p>
                            <label className="inline-block bg-emerald-500 text-white px-10 py-4 rounded-2xl cursor-pointer shadow-lg font-black text-xs uppercase tracking-wider hover:bg-emerald-400 transition-all active:scale-95">
                                📷 Scan Passport Image
                                <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handlePassportScan} />
                            </label>
                        </div>
                        <div className="space-y-2">
                            {ALL_FIELDS.map(renderField)}
                        </div>
                        <div className="fixed bottom-0 left-0 w-full p-6 bg-white/90 backdrop-blur-xl border-t z-40">
                            <button onClick={handleUpdate} disabled={isSaving} className="max-w-2xl mx-auto block w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-sm uppercase tracking-widest shadow-2xl disabled:opacity-50 transition-all active:scale-95">
                                {isSaving ? 'Processing...' : 'Save Worker Data'}
                            </button>
                        </div>
                    </div>
                );
            }
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
