<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSDEC Worker Management</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; color: #1e293b; -webkit-font-smoothing: antialiased; }
        
        .glass-panel { background: white; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .input-field { background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 12px 16px; width: 100%; color: #1e293b; font-weight: 600; outline: none; transition: all 0.2s; }
        .input-field:focus { border-color: #10b981; background: white; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
        
        .label-text { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; display: block; }
        .status-badge { padding: 4px 10px; border-radius: 99px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        window.loadTesseract = function() {
            if (window.Tesseract) return Promise.resolve();
            return new Promise((resolve) => {
                const s = document.createElement('script');
                s.src = "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
                s.onload = resolve;
                document.head.appendChild(s);
            });
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxqFW8-GkEPJTDiXx0X4EprWfCZqih40CDWXQCY1gEozWyFov4zKtmXzUUyTL_U26zJXw/exec';
        
        const ALL_FIELDS = ['ລໍາດັບ', 'ສະຖານະ', 'Re-entry', 'ຊື່ ແລະ ນາມສະກຸນ', 'Full Name', 'Sex', 'Date of birth', 'Age', 'Passport No.', 'Date of issue', 'Date of Expiry', 'Village', 'District', 'Province', 'Size', 'AC - Name', 'AC - No', 'Google drive'];
        
        const formatDateInternational = (val) => {
            if (!val) return '-';
            const s = String(val);
            // GASからの日付文字列やISO形式に対応
            const datePart = s.includes('T') ? s.split('T')[0] : s;
            const parts = datePart.split(/[-/]/); // ハイフンかスラッシュで分割
            
            if (parts.length === 3) {
                // YYYY-MM-DD の場合
                if (parts[0].length === 4) return `${parts[2]}/${parts[1]}/${parts[0]}`;
                // すでに DD/MM/YYYY の場合などはそのまま
                return datePart;
            }
            return datePart;
        };

        const getProvinceColor = (province) => {
            if (!province) return 'bg-slate-50';
            const p = String(province).trim();
            const colors = [
                'bg-blue-50 text-blue-700 border-blue-100',
                'bg-emerald-50 text-emerald-700 border-emerald-100',
                'bg-purple-50 text-purple-700 border-purple-100',
                'bg-amber-50 text-amber-700 border-amber-100',
                'bg-rose-50 text-rose-700 border-rose-100',
                'bg-cyan-50 text-cyan-700 border-cyan-100'
            ];
            let hash = 0;
            for (let i = 0; i < p.length; i++) hash = p.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length];
        };

        function App() {
            const [view, setView] = useState('folders');
            const [workers, setWorkers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedBatch, setSelectedBatch] = useState(null);
            const [selectedWorker, setSelectedWorker] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [masterOptions, setMasterOptions] = useState({ provinces: [], provinceMap: {}, Sex: [], Status: [], Size: [] });

            useEffect(() => { fetchData(); }, []);

            const fetchData = async () => {
                setLoading(true);
                try {
                    const res = await fetch(GAS_URL);
                    const json = await res.json();
                    setWorkers(json.workers || []);
                    setMasterOptions(json.options || { provinces: [], provinceMap: {}, Sex: [], Status: [], Size: [] });
                } catch (e) { console.error(e); }
                setLoading(false);
            };

            const handlePassportScan = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsScanning(true);
                try {
                    await window.loadTesseract();
                    const workerOCR = await Tesseract.createWorker('eng');
                    const { data: { text } } = await workerOCR.recognize(file);
                    await workerOCR.terminate();
                    const cleanText = text.toUpperCase().replace(/ /g, '');
                    const lines = cleanText.split('\n').filter(l => l.length >= 30);
                    if (lines.length >= 2) {
                        const line1 = lines[lines.length - 2];
                        const line2 = lines[lines.length - 1];
                        const namePart = line1.substring(5);
                        const parts = namePart.split('<<');
                        const surname = parts[0]?.replace(/<+/g, ' ').trim() || "";
                        const givenName = parts[1]?.replace(/<+/g, ' ').trim() || "";
                        const passportNo = line2.substring(0, 9).replace(/</g, '');
                        const rawBirth = line2.substring(13, 19);
                        const birthYear = parseInt(rawBirth.substring(0, 2)) > 30 ? "19" + rawBirth.substring(0, 2) : "20" + rawBirth.substring(0, 2);
                        const rawExpiry = line2.substring(21, 27);
                        const expYear = 2000 + parseInt(rawExpiry.substring(0, 2));
                        setSelectedWorker(prev => ({
                            ...prev, 
                            'Full Name': `${surname} ${givenName}`.trim(), 
                            'Passport No.': passportNo, 
                            'Date of birth': `${birthYear}-${rawBirth.substring(2, 4)}-${rawBirth.substring(4, 6)}`, 
                            'Date of Expiry': `${expYear}-${rawExpiry.substring(2, 4)}-${rawExpiry.substring(4, 6)}`, 
                            'Date of issue': `${expYear - 10}-${rawExpiry.substring(2, 4)}-${rawExpiry.substring(4, 6)}`, 
                            'Age': new Date().getFullYear() - parseInt(birthYear)
                        }));
                    }
                } catch (err) { alert("Scan fail"); } finally { setIsScanning(false); }
            };

            const handleUpdate = async () => {
                setIsSaving(true);
                try {
                    const payload = { ...selectedWorker, action: selectedWorker._row ? "update" : "addNew" };
                    await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                    alert("Saved! ✅");
                    await fetchData();
                    setView('list');
                } catch (e) { alert("Save Error"); }
                setIsSaving(false);
            };

            const filteredWorkers = useMemo(() => {
                if (!selectedBatch) return [];
                return workers
                    .filter(w => (w.batch || w._sheetName?.replace("Batch","")) == selectedBatch)
                    .filter(w => `${w['Full Name']} ${w['ຊື່ ແລະ ນາມສະກຸນ']} ${w['Province']} ${w['District']}`.toLowerCase().includes(searchQuery.toLowerCase()));
            }, [workers, selectedBatch, searchQuery]);

            if (loading) return <div className="h-screen flex items-center justify-center font-bold text-slate-900 animate-pulse">HSDEC CONNECTING...</div>;

            if (view === 'folders') return (
                <div className="fade-in max-w-4xl mx-auto p-6">
                    <header className="mb-10">
                        <h1 className="text-3xl font-extrabold text-slate-900">HSDEC Database</h1>
                        <p className="text-slate-500">Worker Batches Overview</p>
                    </header>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {[...new Set(workers.map(w => w.batch || w._sheetName?.replace("Batch","")))].sort((a,b)=>a-b).map(num => (
                            <div key={num} onClick={() => { setSelectedBatch(num); setView('list'); }} 
                                 className="glass-panel p-6 flex justify-between items-center cursor-pointer hover:shadow-lg transition-all group">
                                <span className="text-xl font-bold text-slate-800">Batch {num}</span>
                                <span className="bg-slate-100 text-slate-500 px-4 py-2 rounded-full text-xs font-bold uppercase group-hover:bg-emerald-500 group-hover:text-white transition-colors">View List</span>
                            </div>
                        ))}
                    </div>
                </div>
            );

            if (view === 'list') return (
                <div className="fade-in max-w-6xl mx-auto p-4 md:p-8 pb-20">
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={() => setView('folders')} className="text-sm font-bold text-slate-400">← BATCHES</button>
                        <button onClick={() => { setSelectedWorker({batch: selectedBatch}); setView('edit'); }} className="bg-slate-900 text-white px-6 py-2 rounded-xl font-bold text-xs uppercase shadow-md">+ New Worker</button>
                    </div>
                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
                        <h2 className="text-2xl font-extrabold text-slate-900 tracking-tight">Batch {selectedBatch} Workers</h2>
                        <input type="text" placeholder="Search name, province, or district..." className="glass-panel p-3 w-full md:w-80 outline-none text-sm font-semibold" 
                               value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                    </div>
                    <div className="glass-panel overflow-hidden">
                        <table className="w-full text-left">
                            <thead className="bg-slate-50 border-b border-slate-100">
                                <tr>
                                    <th className="p-4 label-text">No.</th>
                                    <th className="p-4 label-text">Worker Identity</th>
                                    <th className="p-4 label-text">Location</th>
                                    <th className="p-4 label-text">Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filteredWorkers.map((w, i) => (
                                    <tr key={i} onClick={() => { setSelectedWorker({...w}); setView('detail'); }} 
                                        className="border-b border-slate-50 cursor-pointer hover:bg-slate-50 transition-colors">
                                        <td className="p-4 font-bold text-slate-300">#{w['ລໍາດັບ'] || '-'}</td>
                                        <td className="p-4">
                                            <div className="font-extrabold text-slate-900">{w['Full Name']}</div>
                                            <div className="text-[11px] text-slate-400">{w['ຊື່ ແລະ ນາມສະກຸນ']}</div>
                                        </td>
                                        <td className="p-4">
                                            <div className={`inline-block px-3 py-1 rounded-lg border text-[11px] font-extrabold uppercase ${getProvinceColor(w['Province'])}`}>
                                                {w['Province'] || '-'}
                                            </div>
                                        </td>
                                        <td className="p-4">
                                            <span className={`status-badge ${w['ສະຖານະ'] === 'Ready' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'}`}>
                                                {w['ສະຖານະ'] || 'Wait'}
                                            </span>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );

            if (view === 'detail') {
                const Item = ({ label, value, isDate = false }) => (
                    <div className="py-3 border-b border-slate-100 last:border-0 flex justify-between items-center gap-4">
                        <span className="label-text mb-0 w-1/3">{label}</span>
                        <span className="text-slate-900 font-extrabold text-right flex-grow truncate">
                            {isDate ? formatDateInternational(value) : (String(value || '-'))}
                        </span>
                    </div>
                );

                return (
                    <div className="fade-in max-w-2xl mx-auto p-4 md:p-8 pb-20">
                        <div className="flex justify-between items-center mb-8">
                            <button onClick={() => setView('list')} className="text-sm font-bold text-slate-400">← BACK</button>
                            <button onClick={() => setView('edit')} className="bg-emerald-50 text-emerald-600 px-4 py-2 rounded-xl font-extrabold text-xs">EDIT ✎</button>
                        </div>

                        <div className="mb-8">
                            <h2 className="text-3xl font-extrabold text-slate-900 tracking-tighter">{selectedWorker['Full Name']}</h2>
                            <p className="text-lg font-bold text-slate-400 italic">{selectedWorker['ຊື່ ແລະ ນາມສະກຸນ']}</p>
                        </div>

                        <div className="space-y-6">
                            {/* Profile Section */}
                            <div className="glass-panel p-6">
                                <h3 className="text-emerald-500 text-[10px] font-black uppercase mb-4 border-b pb-1">Personal & Profile</h3>
                                <Item label="No (ລໍາດັບ)" value={selectedWorker['ລໍາດັບ']} />
                                <Item label="Status (ສະຖານະ)" value={selectedWorker['ສະຖານະ']} />
                                <Item label="Sex" value={selectedWorker['Sex']} />
                                <Item label="Date of Birth" value={selectedWorker['Date of birth']} isDate={true} />
                                <Item label="Age" value={selectedWorker['Age']} />
                                <Item label="Uniform Size" value={selectedWorker['Size']} />
                                <Item label="Re-entry" value={selectedWorker['Re-entry'] ? 'YES' : 'NO'} />
                            </div>

                            {/* Passport Section */}
                            <div className="glass-panel p-6 bg-slate-900 text-white">
                                <h3 className="text-emerald-400 text-[10px] font-black uppercase mb-4 border-b border-white/10 pb-1">Passport Details</h3>
                                <Item label="Passport No." value={selectedWorker['Passport No.']} />
                                <Item label="Date of Issue" value={selectedWorker['Date of issue']} isDate={true} />
                                <Item label="Date of Expiry" value={selectedWorker['Date of Expiry']} isDate={true} />
                            </div>

                            {/* Location Section */}
                            <div className="glass-panel p-6">
                                <h3 className="text-blue-500 text-[10px] font-black uppercase mb-4 border-b pb-1">Current Address</h3>
                                <Item label="Village" value={selectedWorker['Village']} />
                                <Item label="District" value={selectedWorker['District']} />
                                <Item label="Province" value={selectedWorker['Province']} />
                            </div>

                            {/* Bank Section */}
                            <div className="glass-panel p-6">
                                <h3 className="text-purple-500 text-[10px] font-black uppercase mb-4 border-b pb-1">Bank Account & System</h3>
                                <Item label="A/C Name" value={selectedWorker['AC - Name']} />
                                <Item label="A/C No." value={selectedWorker['AC - No']} />
                                <Item label="Google Drive" value={selectedWorker['Google drive'] ? 'LINK ATTACHED' : 'NO LINK'} />
                                {selectedWorker['Google drive'] && (
                                    <a href={selectedWorker['Google drive']} target="_blank" className="mt-4 block w-full bg-slate-100 py-4 rounded-xl text-center font-bold text-xs text-slate-600 hover:bg-slate-200 transition-all">OPEN DOCUMENT FOLDER 📂</a>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'edit') {
                const renderField = (key) => {
                    let v = selectedWorker[key];
                    const inputStyle = "input-field";
                    
                    if (key === 'Re-entry') return (
                        <div key={key} className="flex items-center justify-between p-4 glass-panel bg-slate-50 mt-4">
                            <label className="label-text mb-0">Re-entry Program</label>
                            <input type="checkbox" className="w-6 h-6 accent-emerald-500" checked={v === true || v === 'TRUE'} 
                                   onChange={(e) => setSelectedWorker({...selectedWorker, [key]: e.target.checked})} />
                        </div>
                    );

                    const masterKeyMap = { "Province": "provinces", "Sex": "Sex", "ສະຖານະ": "Status", "Size": "Size" };
                    if (masterKeyMap[key] || key === 'District') {
                        let list = key === 'Province' ? masterOptions.provinces : (key === 'District' ? masterOptions.provinceMap[selectedWorker.Province] || [] : masterOptions[masterKeyMap[key]] || []);
                        return (
                            <div key={key} className="mb-4">
                                <label className="label-text">{key}</label>
                                <select className={inputStyle} value={v || ''} 
                                    onChange={(e) => {
                                        const val = e.target.value;
                                        if(key === 'Province') {
                                            const dists = masterOptions.provinceMap[val] || [];
                                            setSelectedWorker({...selectedWorker, Province: val, District: dists.length === 1 ? dists[0] : ''});
                                        } else {
                                            setSelectedWorker({...selectedWorker, [key]: val});
                                        }
                                    }} disabled={key === 'District' && !selectedWorker.Province}>
                                    <option value="">Select...</option>
                                    {list.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                </select>
                            </div>
                        );
                    }

                    return (
                        <div key={key} className="mb-4">
                            <label className="label-text">{key}</label>
                            <input className={inputStyle} type={key.includes('Date') || key.includes('Expiry') || key.includes('issue') ? 'date' : 'text'} 
                                   value={v ? (key.includes('Date') || key.includes('Expiry') || key.includes('issue') ? String(v).split('T')[0] : v) : ''} 
                                   onChange={(e) => setSelectedWorker({...selectedWorker, [key]: e.target.value})} />
                        </div>
                    );
                };

                return (
                    <div className="fade-in max-w-2xl mx-auto p-4 md:p-8 pb-32">
                        {isScanning && <div className="fixed inset-0 bg-white/90 z-50 flex items-center justify-center font-black animate-pulse text-emerald-600">AI ANALYZING PASSPORT...</div>}
                        <div className="flex justify-between items-center mb-6">
                            <button onClick={() => setView('list')} className="text-sm font-bold text-slate-400">CANCEL</button>
                            <h3 className="text-sm font-black text-slate-900">EDITOR</h3>
                        </div>
                        <div className="glass-panel p-8 mb-6 text-center bg-slate-900">
                            <label className="inline-block bg-emerald-500 text-white px-8 py-3 rounded-xl cursor-pointer shadow-lg font-bold text-sm">
                                📷 AI SCAN PASSPORT
                                <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handlePassportScan} />
                            </label>
                        </div>
                        <div className="space-y-4">
                            {ALL_FIELDS.map(renderField)}
                        </div>
                        <div className="fixed bottom-0 left-0 w-full p-4 bg-white/80 backdrop-blur-md border-t z-40">
                            <button onClick={handleUpdate} disabled={isSaving} className="max-w-2xl mx-auto block w-full bg-emerald-600 text-white py-4 rounded-xl font-bold text-lg uppercase shadow-xl disabled:opacity-50 transition-all">
                                {isSaving ? 'Saving...' : 'Save Worker Profile'}
                            </button>
                        </div>
                    </div>
                );
            }
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
